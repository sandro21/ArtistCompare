name: Update Billboard stats

on:
  schedule:
    # 1st of every month at 06:00 UTC — full reprocess from MIN_YEAR (scripts/billboard-config.js)
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Reprocess Hot 100 + Billboard 200 (from MIN_YEAR)
        run: npm run update-billboard

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh billboard chart stats'
          file_pattern: 'data/billboard-hot100-stats.json data/billboard200-stats.json'
